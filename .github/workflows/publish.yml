name: Publish to NuGet

# Publishes Zinc.Magic to nuget.org when a version tag is pushed.
#   git tag v1.0.2 && git push origin v1.0.2
# The package version is taken from the tag (leading "v" stripped), so the tag is
# the source of truth — the <Version> in the .csproj is only a local-dev default.
#
# Requires a repo secret NUGET_API_KEY (Settings -> Secrets and variables -> Actions).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Derive version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: >
          dotnet pack Zinc.Magic/Zinc.Magic.csproj
          --configuration Release
          -p:Version=${{ steps.version.outputs.value }}
          -p:GeneratePackageOnBuild=false
          --output ${{ runner.temp }}/pkg

      - name: Push to NuGet
        run: >
          dotnet nuget push "${{ runner.temp }}/pkg/*.nupkg"
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
